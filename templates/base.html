{% import 'components.html' as comp %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="{{ url_for('static', filename='css/output.css') }}"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap"
      rel="stylesheet"
    />
    <script
      defer
      src="https://use.fontawesome.com/releases/v6.4.0/js/all.js"
    ></script>

    <title>{% block title %}기본 제목{% endblock %}</title>
  </head>
  <body>
    <div class="fixed top-0 left-0 w-full px-10 py-4 bg-background">
      <div class="flex items-center justify-between gap-4">
        {% block searchbar %} {% endblock %}
        <div class="flex ml-auto items-center gap-4">
          {{ comp.page_toggle('<i class="fa-regular fa-house"></i>', "홈", "/" )
          }} {{ comp.page_toggle('<i class="fa-solid fa-person"></i>', "내
          정보", url_for('mypage')) }} {{ comp.outlinedText("열쇠 " ~ key_count
          ~ "개") }}
        </div>
      </div>
    </div>
    <div class="pt-20 px-10">{% block content %} {% endblock %}</div>
  </body>
</html>
